name: Deploy Stage

on:
  workflow_run:
    workflows:
      - Baseline CI
    types:
      - completed
  workflow_dispatch:
    inputs:
      commit_sha:
        description: Full 40-character commit SHA to deploy; leave empty to deploy selected ref
        required: false
        type: string

permissions:
  contents: read

env:
  STACK_DIR: /opt/aimeton/auditor-stack
  STAGE_URL: https://stage-auditor.aimeton.ru

concurrency:
  group: aimeton-auditor-stage
  cancel-in-progress: false

jobs:
  deploy:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on:
      - self-hosted
      - Linux
      - X64
      - stage
      - auditor
    environment: stage
    timeout-minutes: 30
    env:
      OS_AUTH_URL: ${{ secrets.OS_AUTH_URL || vars.OS_AUTH_URL || 'https://api.immers.cloud:5000/v3' }}
      OS_APPLICATION_CREDENTIAL_ID: ${{ secrets.OS_APPLICATION_CREDENTIAL_ID || vars.OS_APPLICATION_CREDENTIAL_ID }}
      OS_APPLICATION_CREDENTIAL_SECRET: ${{ secrets.OS_APPLICATION_CREDENTIAL_SECRET }}
      OS_AUTH_TYPE: v3applicationcredential
      OPENSTACK_SERVER_ID: ${{ vars.OPENSTACK_SERVER_ID }}
      OPENSTACK_SERVER_NAME: ${{ vars.OPENSTACK_SERVER_NAME }}
      BACKUP_KEEP: ${{ vars.STAGE_BACKUP_KEEP || '5' }}
      FAILED_KEEP: ${{ vars.STAGE_FAILED_KEEP || '2' }}

    steps:
      - name: Resolve exact deployment SHA
        id: target
        shell: bash
        env:
          WORKFLOW_RUN_SHA: ${{ github.event.workflow_run.head_sha }}
          MANUAL_SHA: ${{ inputs.commit_sha }}
          FALLBACK_SHA: ${{ github.sha }}
        run: |
          set -Eeuo pipefail
          sha="${WORKFLOW_RUN_SHA:-}"
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            sha="${MANUAL_SHA:-$FALLBACK_SHA}"
          fi
          [[ "$sha" =~ ^[0-9a-f]{40}$ ]] || {
            echo "Invalid deployment SHA: $sha" >&2
            exit 1
          }
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "Deploy target: $sha"

      - name: Checkout exact commit
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.target.outputs.sha }}
          fetch-depth: 1

      - name: Verify checkout identity
        shell: bash
        env:
          DEPLOY_SHA: ${{ steps.target.outputs.sha }}
        run: |
          set -Eeuo pipefail
          actual="$(git rev-parse HEAD)"
          echo "Expected: $DEPLOY_SHA"
          echo "Actual:   $actual"
          [[ "$actual" == "$DEPLOY_SHA" ]]

      - name: Prepare OpenStack preflight environment
        shell: bash
        run: |
          set -Eeuo pipefail
          for name in OS_AUTH_URL OS_APPLICATION_CREDENTIAL_ID OS_APPLICATION_CREDENTIAL_SECRET OPENSTACK_SERVER_ID OPENSTACK_SERVER_NAME; do
            test -n "${!name:-}" || { echo "Missing required stage OpenStack setting: $name"; exit 1; }
          done
          python3 -m venv .venv-openstack-deploy
          . .venv-openstack-deploy/bin/activate
          python -m pip install --disable-pip-version-check -q -r requirements-openstack.txt

      - name: OpenStack preflight
        shell: bash
        run: |
          set -Eeuo pipefail
          . .venv-openstack-deploy/bin/activate
          mkdir -p deployment-evidence
          python scripts/openstack_inventory.py --compute-only --output deployment-evidence/openstack-preflight.json >/dev/null
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          payload = json.loads(Path('deployment-evidence/openstack-preflight.json').read_text(encoding='utf-8'))
          server = next((item for item in payload.get('servers', []) if item.get('id') == os.environ['OPENSTACK_SERVER_ID']), None)
          assert server, 'Configured OpenStack server was not found'
          assert server.get('name') == os.environ['OPENSTACK_SERVER_NAME'], server
          assert server.get('status') == 'ACTIVE', server
          print(f"OpenStack preflight OK: {server['name']} {server['id']} status={server['status']}")
          PY

      - name: Deploy transactionally to stage
        shell: bash
        env:
          DEPLOY_SHA: ${{ steps.target.outputs.sha }}
          SOURCE_DIR: ${{ github.workspace }}
        run: |
          set -Eeuo pipefail
          mkdir -p deployment-evidence
          chmod +x scripts/deploy_stage.sh
          scripts/deploy_stage.sh 2>&1 | tee "deployment-evidence/deploy-${DEPLOY_SHA}.log"

      - name: OpenStack postflight
        if: always()
        shell: bash
        run: |
          set +e
          if [[ -x .venv-openstack-deploy/bin/python ]]; then
            . .venv-openstack-deploy/bin/activate
            python scripts/openstack_inventory.py --compute-only --output deployment-evidence/openstack-postflight.json >/dev/null
            python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          path = Path('deployment-evidence/openstack-postflight.json')
          if not path.exists():
              raise SystemExit(0)
          payload = json.loads(path.read_text(encoding='utf-8'))
          server = next((item for item in payload.get('servers', []) if item.get('id') == os.environ.get('OPENSTACK_SERVER_ID')), None)
          summary = {
              'project_id': payload.get('project_id'),
              'server_id': server.get('id') if server else None,
              'server_name': server.get('name') if server else None,
              'server_status': server.get('status') if server else None,
          }
          Path('deployment-evidence/openstack-postflight-summary.json').write_text(
              json.dumps(summary, ensure_ascii=False, indent=2, sort_keys=True) + '\n',
              encoding='utf-8',
          )
          print(json.dumps(summary, ensure_ascii=False, sort_keys=True))
          PY
          fi

      - name: Record final stage evidence
        if: always()
        shell: bash
        env:
          DEPLOY_SHA: ${{ steps.target.outputs.sha }}
        run: |
          set +e
          mkdir -p deployment-evidence
          {
            echo "requested_sha=$DEPLOY_SHA"
            echo "workflow_run_id=$GITHUB_RUN_ID"
            echo "workflow_attempt=$GITHUB_RUN_ATTEMPT"
            echo "actor=$GITHUB_ACTOR"
            echo "timestamp_utc=$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            echo "bundle_sha=$(cat "$STACK_DIR/app-source-sha.txt" 2>/dev/null || echo unavailable)"
            echo "backup_keep=$BACKUP_KEEP"
            echo "failed_keep=$FAILED_KEEP"
            docker ps --filter name=aimeton-auditor --format 'container={{.Names}} image={{.Image}} status={{.Status}}'
            curl -sS -D - -o /dev/null --max-redirs 0 "$STAGE_URL/mcp" || true
            curl -sS "$STAGE_URL/api/health" || true
          } | tee "deployment-evidence/final-state-${DEPLOY_SHA}.txt"

      - name: Upload deployment evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stage-deployment-${{ steps.target.outputs.sha }}-${{ github.run_id }}
          path: deployment-evidence/
          if-no-files-found: error
          retention-days: 30
