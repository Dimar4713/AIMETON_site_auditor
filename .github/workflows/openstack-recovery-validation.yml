name: OpenStack Recovery Validation

on:
  workflow_dispatch:
    inputs:
      mode:
        description: plan is read-only; create/delete mutate validation resources only
        required: true
        type: choice
        options: [plan, create, delete]
        default: plan
      validation_name:
        description: Isolated server name starting with aimeton-validation-
        required: true
        type: string
      reason:
        description: Why this recovery validation action is required
        required: true
        type: string
      image_id:
        description: Active snapshot image UUID (required for plan/create)
        required: false
        type: string
      flavor:
        description: Flavor name or UUID (required for plan/create)
        required: false
        type: string
      network:
        description: Network name or UUID (required for plan/create)
        required: false
        type: string
      security_groups:
        description: Comma-separated security group names; may be empty
        required: false
        type: string
      key_name:
        description: Existing keypair name; may be empty
        required: false
        type: string
      validation_server_id:
        description: Exact temporary server UUID (required only for delete)
        required: false
        type: string
      confirm:
        description: CREATE <validation_name> or DELETE <validation_server_id>; empty for plan
        required: false
        type: string

permissions:
  contents: read
  issues: write

concurrency:
  group: aimeton-openstack-recovery-validation
  cancel-in-progress: false

jobs:
  validate:
    name: Guarded snapshot recovery validation
    runs-on: [self-hosted, Linux, X64, stage, auditor]
    environment: stage
    timeout-minutes: 30
    env:
      OS_AUTH_URL: ${{ secrets.OS_AUTH_URL || vars.OS_AUTH_URL || 'https://api.immers.cloud:5000/v3' }}
      OS_APPLICATION_CREDENTIAL_ID: ${{ secrets.OS_APPLICATION_CREDENTIAL_ID || vars.OS_APPLICATION_CREDENTIAL_ID }}
      OS_APPLICATION_CREDENTIAL_SECRET: ${{ secrets.OS_APPLICATION_CREDENTIAL_SECRET }}
      OPENSTACK_SERVER_ID: ${{ vars.OPENSTACK_SERVER_ID }}

    steps:
      - uses: actions/checkout@v4

      - name: Validate workflow guardrails
        shell: bash
        env:
          MODE: ${{ inputs.mode }}
          VALIDATION_NAME: ${{ inputs.validation_name }}
          REASON: ${{ inputs.reason }}
          IMAGE_ID: ${{ inputs.image_id }}
          FLAVOR: ${{ inputs.flavor }}
          NETWORK: ${{ inputs.network }}
          VALIDATION_SERVER_ID: ${{ inputs.validation_server_id }}
          CONFIRM: ${{ inputs.confirm }}
        run: |
          set -Eeuo pipefail
          for name in OS_AUTH_URL OS_APPLICATION_CREDENTIAL_ID OS_APPLICATION_CREDENTIAL_SECRET OPENSTACK_SERVER_ID; do
            test -n "${!name:-}" || { echo "Missing required stage setting: $name"; exit 1; }
          done
          [[ "$VALIDATION_NAME" =~ ^aimeton-validation-[a-z0-9][a-z0-9-]{2,48}$ ]] || {
            echo "Invalid validation_name" >&2; exit 1;
          }
          [[ ${#REASON} -ge 8 ]] || { echo "Reason must contain at least 8 characters" >&2; exit 1; }
          if [[ "$MODE" == "plan" || "$MODE" == "create" ]]; then
            test -n "$IMAGE_ID" && test -n "$FLAVOR" && test -n "$NETWORK" || {
              echo "image_id, flavor and network are required" >&2; exit 1;
            }
          fi
          if [[ "$MODE" == "create" ]]; then
            [[ "$CONFIRM" == "CREATE $VALIDATION_NAME" ]] || { echo "Invalid CREATE confirmation" >&2; exit 1; }
          elif [[ "$MODE" == "delete" ]]; then
            test -n "$VALIDATION_SERVER_ID" || { echo "validation_server_id is required" >&2; exit 1; }
            [[ "$VALIDATION_SERVER_ID" != "$OPENSTACK_SERVER_ID" ]] || { echo "Canonical server cannot be deleted" >&2; exit 1; }
            [[ "$CONFIRM" == "DELETE $VALIDATION_SERVER_ID" ]] || { echo "Invalid DELETE confirmation" >&2; exit 1; }
          else
            test -z "$CONFIRM" || { echo "plan mode requires empty confirmation" >&2; exit 1; }
          fi

      - name: Prepare OpenStack environment
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 -m venv .venv-openstack-recovery
          . .venv-openstack-recovery/bin/activate
          python -m pip install --disable-pip-version-check -q -r requirements-openstack.txt

      - name: Execute guarded validation action
        shell: bash
        env:
          MODE: ${{ inputs.mode }}
          VALIDATION_NAME: ${{ inputs.validation_name }}
          REASON: ${{ inputs.reason }}
          IMAGE_ID: ${{ inputs.image_id }}
          FLAVOR: ${{ inputs.flavor }}
          NETWORK: ${{ inputs.network }}
          SECURITY_GROUPS: ${{ inputs.security_groups }}
          KEY_NAME: ${{ inputs.key_name }}
          VALIDATION_SERVER_ID: ${{ inputs.validation_server_id }}
          CONFIRM: ${{ inputs.confirm }}
        run: |
          set -Eeuo pipefail
          . .venv-openstack-recovery/bin/activate
          mkdir -p recovery-evidence
          args=(
            --mode "$MODE"
            --validation-name "$VALIDATION_NAME"
            --reason "$REASON"
            --image-id "$IMAGE_ID"
            --flavor "$FLAVOR"
            --network "$NETWORK"
            --key-name "$KEY_NAME"
            --server-id "$VALIDATION_SERVER_ID"
            --confirm "$CONFIRM"
            --output recovery-evidence/recovery-validation.json
          )
          IFS=',' read -ra groups <<< "$SECURITY_GROUPS"
          for group in "${groups[@]}"; do
            group="${group#${group%%[![:space:]]*}}"
            group="${group%${group##*[![:space:]]}}"
            [[ -z "$group" ]] || args+=(--security-group "$group")
          done
          python scripts/openstack_recovery_validation.py "${args[@]}"

      - name: Record sanitized workflow context
        if: always()
        shell: bash
        run: |
          set +e
          mkdir -p recovery-evidence
          {
            echo "workflow_run_id=$GITHUB_RUN_ID"
            echo "workflow_attempt=$GITHUB_RUN_ATTEMPT"
            echo "actor=$GITHUB_ACTOR"
            echo "mode=${{ inputs.mode }}"
            echo "validation_name=${{ inputs.validation_name }}"
            echo "timestamp_utc=$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          } > recovery-evidence/workflow-context.txt

      - name: Upload sanitized evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openstack-recovery-validation-${{ inputs.mode }}-${{ github.run_id }}
          path: recovery-evidence/
          retention-days: 90
          if-no-files-found: error

      - name: Publish result to Issue 35
        if: success()
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require('fs');
            const evidence = JSON.parse(fs.readFileSync('recovery-evidence/recovery-validation.json', 'utf8'));
            const server = evidence.validation_server || {};
            const lines = [
              '## Recovery validation workflow result',
              '',
              `- mode: \`${evidence.mode}\``,
              `- result: \`${evidence.result}\``,
              `- validation resource: \`${evidence.validation_name}\``,
              server.id ? `- validation server id: \`${server.id}\`` : null,
              server.status ? `- validation server status: \`${server.status}\`` : null,
              `- workflow run: \`${context.runId}\``,
              '',
              'Full sanitized evidence is stored in the workflow artifact.',
            ].filter(Boolean);
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 35,
              body: lines.join('\n'),
            });
